name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---- saga-orchestrator ----
      - name: Install (saga-orchestrator)
        working-directory: saga-orchestrator
        run: npm install --no-audit --no-fund

      - name: Build (saga-orchestrator)
        working-directory: saga-orchestrator
        run: npm run build

      - name: Lint (saga-orchestrator)
        working-directory: saga-orchestrator
        run: npm run lint --if-present

      - name: Test (saga-orchestrator)
        working-directory: saga-orchestrator
        run: npm run test:unit

      # ---- services/* ----
      - name: Install + build (services)
        shell: bash
        run: |
          set -euo pipefail
          for d in services/*; do
            if [ -f "$d/package.json" ]; then
              echo "==> $d"
              (cd "$d" && npm install --no-audit --no-fund && npm run build)
            fi
          done
