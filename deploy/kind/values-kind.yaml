config:
  kafkaBrokers: "kafka:9092"
  sagaStateStore: "redis"
  typeorm:
    synchronize: "false"
    logging: "false"

secrets:
  redisUrl: "redis://redis-master:6379"
  orchestratorDatabaseUrl: "postgresql://saga_user:saga_pass@postgres-saga-postgresql:5432/saga_db"
  ordersDatabaseUrl: "postgresql://orders_user:orders_pass@postgres-orders-postgresql:5432/orders_db"
  paymentsDatabaseUrl: "postgresql://payments_user:payments_pass@postgres-payments-postgresql:5432/payments_db"
  inventoryDatabaseUrl: "postgresql://inventory_user:inventory_pass@postgres-inventory-postgresql:5432/inventory_db"
