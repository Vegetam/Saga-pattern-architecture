apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command: ["sh","-c","BROKER=\"$(echo \"$KAFKA_BROKERS\" | cut -d, -f1)\"; HOST=\"$(echo \"$BROKER\" | cut -d: -f1)\"; PORT=\"$(echo \"$BROKER\" | cut -d: -f2)\"; until nc -z \"$HOST\" \"$PORT\"; do sleep 2; done"]
          envFrom:
            - configMapRef:
                name: saga-config
      containers:
        - name: notification-service
          image: notification-service:latest
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: saga-config
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: http
