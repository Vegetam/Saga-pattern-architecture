apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - secret.yaml
  - orchestrator.yaml
  - order.yaml
  - payment.yaml
  - inventory.yaml
  - notification.yaml

images:
  - name: saga-orchestrator
    newName: saga-orchestrator
    newTag: latest
  - name: order-service
    newName: order-service
    newTag: latest
  - name: payment-service
    newName: payment-service
    newTag: latest
  - name: inventory-service
    newName: inventory-service
    newTag: latest
  - name: notification-service
    newName: notification-service
    newTag: latest
