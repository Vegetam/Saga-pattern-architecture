apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command: ["sh","-c","BROKER=\"$(echo \"$KAFKA_BROKERS\" | cut -d, -f1)\"; HOST=\"$(echo \"$BROKER\" | cut -d: -f1)\"; PORT=\"$(echo \"$BROKER\" | cut -d: -f2)\"; until nc -z \"$HOST\" \"$PORT\"; do sleep 2; done"]
          envFrom:
            - configMapRef:
                name: saga-config
        - name: wait-db
          image: postgres:15-alpine
          command: ["sh","-c","until pg_isready -d \"$DATABASE_URL\"; do sleep 2; done"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: saga-secrets
                  key: ORDERS_DATABASE_URL
      containers:
        - name: order-service
          image: order-service:latest
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: saga-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: saga-secrets
                  key: ORDERS_DATABASE_URL
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: http
